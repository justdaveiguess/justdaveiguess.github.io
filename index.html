<!DOCTYPE html>
<html>
<head>
<title>Multi Timeframe Trading Clock</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    margin:20px;
}

#clockTime{
    font-size:52px;
    font-weight:bold;
    margin-bottom:25px;
}

.container{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.panel{
    background:#1b1b1b;
    border:2px solid #444;
    border-radius:14px;
    padding:20px;
    width:300px;
}

.title{
    font-size:30px;
    font-weight:bold;
    margin-bottom:15px;
}

.clock{
    width:220px;
    height:220px;
    border:8px solid white;
    border-radius:50%;
    margin:auto;
    position:relative;
    background:#222;
}

.hand{
    position:absolute;
    width:6px;
    height:90px;
    left:107px;
    top:22px;
    transform-origin:bottom center;
    background:lime;
    border-radius:5px;
}

.center{
    width:16px;
    height:16px;
    background:white;
    border-radius:50%;
    position:absolute;
    left:102px;
    top:102px;
}

.number{
    position:absolute;
    color:white;
    font-size:20px;
    font-weight:bold;
}

.twelve{top:8px;left:100px;}
.three{top:98px;right:10px;}
.six{bottom:8px;left:104px;}
.nine{top:98px;left:10px;}

.countdown{
    font-size:46px;
    font-weight:bold;
    margin-top:18px;
}

.status{
    font-size:24px;
    font-weight:bold;
    margin-top:8px;
}
</style>
</head>

<body>

<div id="clockTime">00:00:00</div>

<div class="container">

    <div class="panel">
        <div class="title">1 Minute</div>
        <div class="clock">
            <div class="number twelve">12</div>
            <div class="number three">3</div>
            <div class="number six">6</div>
            <div class="number nine">9</div>
            <div id="hand1" class="hand"></div>
            <div class="center"></div>
        </div>
        <div id="countdown1" class="countdown">1:00</div>
        <div id="status1" class="status">GREEN ZONE</div>
    </div>

    <div class="panel">
        <div class="title">5 Minute</div>
        <div class="clock">
            <div class="number twelve">12</div>
            <div class="number three">3</div>
            <div class="number six">6</div>
            <div class="number nine">9</div>
            <div id="hand5" class="hand"></div>
            <div class="center"></div>
        </div>
        <div id="countdown5" class="countdown">5:00</div>
        <div id="status5" class="status">GREEN ZONE</div>
    </div>

    <div class="panel">
        <div class="title">10 Minute</div>
        <div class="clock">
            <div class="number twelve">12</div>
            <div class="number three">3</div>
            <div class="number six">6</div>
            <div class="number nine">9</div>
            <div id="hand10" class="hand"></div>
            <div class="center"></div>
        </div>
        <div id="countdown10" class="countdown">10:00</div>
        <div id="status10" class="status">GREEN ZONE</div>
    </div>

</div>

<script>
function updateMainClock(now){
    let hour = now.getHours();
    const minute = now.getMinutes();
    const second = now.getSeconds();

    const ampm = hour >= 12 ? "PM" : "AM";

    hour = hour % 12;
    if(hour === 0) hour = 12;

    document.getElementById("clockTime").innerHTML =
        hour + ":" +
        (minute < 10 ? "0" : "") + minute + ":" +
        (second < 10 ? "0" : "") + second +
        " " + ampm;
}

function updatePanel(minutes, handId, countdownId, statusId){
    const now = new Date();

    const candleLength = minutes * 60;

    // Align each timer to exact candle boundaries.
    // 1m: every minute
    // 5m: :00, :05, :10, :15, :20, :25, :30...
    // 10m: :00, :10, :20, :30, :40, :50...
    const currentMinute = now.getMinutes();
    const currentSecond = now.getSeconds();

    const startMinute = Math.floor(currentMinute / minutes) * minutes;

    const elapsed =
        (currentMinute - startMinute) * 60 +
        currentSecond;

    const left = candleLength - elapsed;

    const minLeft = Math.floor(left / 60);
    const secLeft = left % 60;

    document.getElementById(countdownId).innerHTML =
        minLeft + ":" +
        (secLeft < 10 ? "0" : "") + secLeft;

    const angle = (elapsed / candleLength) * 360;

    document.getElementById(handId).style.transform =
        "rotate(" + angle + "deg)";

    const percentRemaining = left / candleLength;

    let color;
    let label;

    if(percentRemaining > 0.40){
        color = "lime";
        label = "GREEN ZONE";
    }
    else if(percentRemaining > 0.20){
        color = "yellow";
        label = "YELLOW ZONE";
    }
    else{
        color = "red";
        label = "RED ZONE";
    }

    document.getElementById(handId).style.background = color;
    document.getElementById(countdownId).style.color = color;
    document.getElementById(statusId).style.color = color;
    document.getElementById(statusId).innerHTML = label;
}

function updateAll(){
    const now = new Date();

    updateMainClock(now);

    updatePanel(1, "hand1", "countdown1", "status1");
    updatePanel(5, "hand5", "countdown5", "status5");
    updatePanel(10, "hand10", "countdown10", "status10");
}

setInterval(updateAll, 1000);
updateAll();
</script>

</body>
</html>
